name: Deploy Media API Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/media-api/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: media-api-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 9b02d2b28bee33e4fa5cc64bf9ab262c
        run: npx --yes wrangler@4 deploy --config workers/media-api/wrangler.toml

      - name: Verify media API
        run: |
          curl --fail --silent --show-error https://upload.escoopcity.com/health
