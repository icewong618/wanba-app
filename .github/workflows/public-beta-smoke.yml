name: Public Beta Smoke Check

on:
  workflow_dispatch:
  schedule:
    - cron: '20 16 * * *'

permissions:
  contents: read

concurrency:
  group: public-beta-smoke
  cancel-in-progress: false

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check public beta site
        env:
          PUBLIC_BETA_URL: https://escoopcity.com
          PUBLIC_BETA_MERCHANT_PATH: /sichuan-garden-la
        run: EXPECTED_VERSION="$(node -p "require('./version.json').version")" node scripts/public-beta-smoke.mjs
