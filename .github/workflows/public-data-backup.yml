name: Public Data Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'

permissions:
  contents: read

concurrency:
  group: public-data-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Check backup connection
        run: |
          test -n "$SUPABASE_DB_URL" || (echo "Missing SUPABASE_DB_URL GitHub secret" && exit 1)

      - name: Export public schema and data
        run: |
          mkdir -p backup
          supabase db dump --db-url "$SUPABASE_DB_URL" --schema public --file backup/public-schema.sql
          supabase db dump --db-url "$SUPABASE_DB_URL" --schema public --data-only --use-copy --file backup/public-data.sql
          printf 'created_at=%s\ncommit=%s\ntrigger=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$GITHUB_SHA" "$GITHUB_EVENT_NAME" > backup/metadata.txt
          test -s backup/public-schema.sql
          test -s backup/public-data.sql

      - name: Upload private backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: scoop-city-public-backup-${{ github.run_id }}
          path: backup/
          retention-days: 14
          if-no-files-found: error
