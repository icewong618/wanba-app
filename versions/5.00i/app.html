<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Surrogate-Control" content="no-store">
<title>乐生活 · 正在更新</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fffaf7;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC",sans-serif;color:#2A2721;}
  body{position:fixed;inset:0;}
  #appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#fffaf7;}
  .app-launch{
    position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
    padding:calc(24px + env(safe-area-inset-top)) 22px calc(24px + env(safe-area-inset-bottom));
    background:radial-gradient(circle at 50% 18%, rgba(255,107,53,.10), transparent 34%),linear-gradient(180deg,#fffaf7 0%,#ffffff 58%,#fff6f2 100%);
    transition:opacity .28s ease,visibility .28s ease;
  }
  .app-launch.done{opacity:0;visibility:hidden;pointer-events:none;}
  .box{width:min(86vw,320px);text-align:center;}
  .logo{width:86px;height:86px;margin:0 auto 18px;border-radius:24px;background:linear-gradient(135deg,#ff8a00 0%,#ff5a28 45%,#f01772 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:900;box-shadow:0 18px 42px rgba(255,86,45,.24);}
  .brand{font-size:26px;font-weight:900;letter-spacing:0;margin-bottom:6px;}
  .version{display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid #E8E0D2;color:#A39C8A;font-size:11px;font-weight:900;}
  .sub{font-size:13px;color:#6B6558;font-weight:600;margin-bottom:26px;}
  .status{font-size:13px;color:#6B6558;min-height:20px;margin-bottom:13px;}
  .bar{width:100%;height:4px;border-radius:999px;background:rgba(255,107,53,.14);overflow:hidden;}
  .bar span{display:block;width:42%;height:100%;border-radius:999px;background:linear-gradient(90deg,#ff8a00,#ff5a28,#f01772);animation:move 1.1s ease-in-out infinite;}
  .hint{font-size:12px;color:#A39C8A;margin-top:14px;line-height:1.6;}
  @keyframes move{0%{transform:translateX(-105%);}100%{transform:translateX(250%);}}
</style>
</head>
<body>
  <iframe id="appFrame" title="乐生活"></iframe>
  <div class="app-launch" id="appLaunch">
    <main class="box">
      <div class="logo">乐</div>
      <div class="brand">乐生活</div>
      <div class="version">v5.00i</div>
      <div class="sub">发现身边的精彩生活</div>
      <div class="status" id="status">正在获取最新版本…</div>
      <div class="bar"><span></span></div>
      <div class="hint">内容很快就到</div>
    </main>
  </div>
<script>
  const FALLBACK_VERSION = '5.00i';
  const APP_ENTRY_TIMEOUT_MS = 2200;
  const statusEl = document.getElementById('status');
  const launchEl = document.getElementById('appLaunch');
  const frameEl = document.getElementById('appFrame');
  let opened = false;
  let readyTimer = null;
  function setStatus(text){ if(statusEl) statusEl.textContent = text; }
  function hideAppLaunch(){
    if(readyTimer) clearTimeout(readyTimer);
    if(launchEl) launchEl.classList.add('done');
  }
  function cacheBustedUrl(path){
    const url = new URL(path, window.location.href);
    url.searchParams.set('t', String(Date.now()));
    return url;
  }
  async function clearRuntimeCaches(){
    try {
      if('serviceWorker' in navigator){
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.unregister()));
      }
    } catch(e){}
    try {
      if('caches' in window){
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
    } catch(e){}
  }
  function indexUrl(version){
    const target = new URL('index.html', window.location.href);
    target.searchParams.set('app_v', version || FALLBACK_VERSION);
    target.searchParams.set('embedded_app', '1');
    target.searchParams.set('refresh_t', String(Date.now()));
    return target;
  }
  function showLoadError(){
    opened = false;
    setStatus('网络连接较慢，请重新打开 App');
  }
  async function openIndex(version){
    if(opened) return;
    opened = true;
    const target = indexUrl(version);
    try {
      setStatus('正在进入乐生活…');
      try { sessionStorage.setItem('leshenghuo_embedded_app_entry', '1'); } catch(e){}
      frameEl.src = target.href;
      readyTimer = setTimeout(hideAppLaunch, 5200);
    } catch(e){
      console.warn('App 内加载首页失败:', e.message);
      showLoadError();
    }
  }
  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
    ]);
  }
  async function openLatest(){
    const fallbackTimer = setTimeout(() => {
      setStatus('正在进入乐生活…');
      openIndex(FALLBACK_VERSION);
    }, APP_ENTRY_TIMEOUT_MS);
    try {
      setStatus('正在检查最新版本…');
      clearRuntimeCaches();
      const res = await withTimeout(fetch(cacheBustedUrl('version.json').href, {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      }), 1500);
      let version = FALLBACK_VERSION;
      if(res.ok){
        const data = await res.json();
        version = String(data.version || version).trim() || version;
        if(data.message) setStatus(data.message);
      }
      clearTimeout(fallbackTimer);
      openIndex(version);
    } catch(e){
      setStatus('网络较慢，正在重新打开…');
      clearTimeout(fallbackTimer);
      openIndex(FALLBACK_VERSION);
    }
  }
  window.addEventListener('message', event => {
    if(event && event.data && event.data.type === 'leshenghuo_app_ready') hideAppLaunch();
  });
  frameEl.addEventListener('load', () => {
    if(readyTimer) clearTimeout(readyTimer);
    readyTimer = setTimeout(hideAppLaunch, 4200);
  });
  openLatest();
</script>
</body>
</html>
