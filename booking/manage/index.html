<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315a40"><title>乐生活预约管理</title><link rel="stylesheet" href="../booking.css?v=5.580"><link rel="stylesheet" href="../../i18n/module-language.css?v=5.580"><script src="../../i18n/i18n.js?v=5.580"></script><style>.booking-app{padding-bottom:calc(60px + env(safe-area-inset-bottom))}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tabs button{border:1px solid var(--line);border-radius:10px;padding:10px 5px;background:#fff;font-weight:800;color:var(--soft)}.tabs button.on{background:var(--deep);border-color:var(--deep);color:#fff}.booking-card{padding:13px 0;border-bottom:1px solid var(--line)}.booking-card:last-child{border-bottom:0}.booking-card-head{display:flex;justify-content:space-between;gap:12px}.booking-card b{font-size:15px}.booking-card small{display:block;margin-top:5px;color:var(--soft);line-height:1.45}.status{display:inline-block;padding:4px 8px;border-radius:999px;background:#f0ede4;color:#786c4b;font-size:11px;font-weight:800}.status.confirmed{background:#e4f0e6;color:#356142}.status.completed{background:#e7edf2;color:#3d6078}.status.cancelled,.status.rejected{background:#f6e7e8;color:#a3314e}.tiny-actions{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}.tiny-actions button{border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:#fff;color:var(--ink);font-size:12px;font-weight:800}.tiny-actions .ok{border-color:var(--sage);color:var(--deep)}.service-form{display:grid;gap:10px}.service-form .field{font-size:12px}.service-form .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.service-item{display:flex;gap:10px;align-items:start;padding:12px 0;border-bottom:1px solid var(--line)}.service-item:last-child{border-bottom:0}.service-item>div{flex:1}.service-item p{margin:4px 0 0;color:var(--soft);font-size:12px;line-height:1.45}.service-item button{border:1px solid var(--line);border-radius:8px;padding:7px;background:#fff;color:var(--deep);font-size:12px;font-weight:800}</style></head><body><main class="booking-app" id="bookingManageApp"><div class="loading">正在读取预约管理...</div></main><script src="../../shared/module-bridge.js?v=5.616"></script><script src="./manage.js?v=5.580"></script></body></html>
