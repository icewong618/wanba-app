<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fffaf7">
  <title>乐生活 - 网络不可用</title>
  <style>
    :root{color-scheme:light;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;}
    *{box-sizing:border-box;} body{margin:0;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:calc(28px + env(safe-area-inset-top)) 28px calc(28px + env(safe-area-inset-bottom));background:linear-gradient(180deg,#fffaf7 0%,#ffffff 58%,#fff6f2 100%);color:#292820;}
    main{width:min(100%,340px);text-align:center;}.mark{width:78px;height:78px;margin:0 auto 22px;border-radius:24px;display:grid;place-items:center;background:#edf2ea;color:#426c50;}.mark svg{width:40px;height:40px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}h1{margin:0 0 10px;font-size:23px;letter-spacing:0;}p{margin:0;color:#77736a;font-size:14px;line-height:1.7;}button{width:100%;min-height:50px;margin-top:28px;border:0;border-radius:12px;background:#5f8567;color:#fff;font:800 15px inherit;}small{display:block;margin-top:14px;color:#9a958a;font-size:12px;line-height:1.6;}
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12.6a10 10 0 0 1 14 0"></path><path d="M8.4 16a5 5 0 0 1 7.2 0"></path><path d="M12 20h.01"></path><path d="M3 3l18 18"></path></svg></div>
    <h1>暂时无法连接网络</h1>
    <p>请检查 Wi-Fi 或移动数据连接后，再重新打开乐生活。</p>
    <button type="button" onclick="location.reload()">重新连接</button>
    <small>网络恢复后，内容会自动继续更新。</small>
  </main>
</body>
</html>
