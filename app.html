<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Surrogate-Control" content="no-store">
<title>乐生活 · 正在更新</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;width:100%;min-height:100%;overflow:hidden;background:#fffaf7;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC",sans-serif;color:#2A2721;}
  body{display:flex;align-items:center;justify-content:center;padding:calc(24px + env(safe-area-inset-top)) 22px calc(24px + env(safe-area-inset-bottom));}
  .box{width:min(86vw,320px);text-align:center;}
  .logo{width:82px;height:82px;margin:0 auto 16px;border-radius:24px;background:linear-gradient(135deg,#ff7a18 0%,#ff4f32 48%,#e91e63 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900;box-shadow:0 16px 40px rgba(194,65,107,.24);}
  .brand{font-size:24px;font-weight:900;letter-spacing:.08em;margin-bottom:6px;}
  .sub{font-size:13px;color:#6B6558;margin-bottom:20px;}
  .status{font-size:13px;color:#436449;font-weight:800;min-height:22px;}
  .bar{width:100%;height:8px;border-radius:999px;background:#EFEBDF;overflow:hidden;margin-top:16px;}
  .bar span{display:block;width:42%;height:100%;border-radius:999px;background:#5F8567;animation:move 1.15s ease-in-out infinite;}
  .hint{font-size:11px;color:#A39C8A;margin-top:14px;line-height:1.6;}
  @keyframes move{0%{transform:translateX(-100%);}50%{transform:translateX(80%);}100%{transform:translateX(260%);}}
</style>
</head>
<body>
  <main class="box">
    <div class="logo">乐</div>
    <div class="brand">乐生活</div>
    <div class="sub">发现身边的精彩生活</div>
    <div class="status" id="status">正在获取最新版本…</div>
    <div class="bar"><span></span></div>
    <div class="hint">内容很快就到</div>
  </main>
<script>
  const FALLBACK_VERSION = '4.99e';
  const APP_ENTRY_TIMEOUT_MS = 2200;
  const statusEl = document.getElementById('status');
  let opened = false;
  function setStatus(text){ if(statusEl) statusEl.textContent = text; }
  function cacheBustedUrl(path){
    const url = new URL(path, window.location.href);
    url.searchParams.set('t', String(Date.now()));
    return url;
  }
  async function clearRuntimeCaches(){
    try {
      if('serviceWorker' in navigator){
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.unregister()));
      }
    } catch(e){}
    try {
      if('caches' in window){
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
    } catch(e){}
  }
  function indexUrl(version){
    const target = new URL('index.html', window.location.href);
    target.searchParams.set('app_v', version || FALLBACK_VERSION);
    target.searchParams.set('embedded_app', '1');
    target.searchParams.set('refresh_t', String(Date.now()));
    return target;
  }
  function showLoadError(){
    opened = false;
    setStatus('网络连接较慢，请重新打开 App');
  }
  async function openIndex(version){
    if(opened) return;
    opened = true;
    const target = indexUrl(version);
    try {
      setStatus('正在进入乐生活…');
      try { sessionStorage.setItem('leshenghuo_embedded_app_entry', '1'); } catch(e){}
      const res = await withTimeout(fetch(target.href, {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      }), 2600);
      if(!res.ok) throw new Error('index http ' + res.status);
      let html = await res.text();
      html = html.replace(/<html([^>]*)>/i, (match, attrs) => {
        if(/\bclass=/.test(attrs)){
          return `<html${attrs.replace(/class=(["'])(.*?)\1/i, 'class=$1$2 embedded-app-entry$1')}>`;
        }
        return `<html${attrs} class="embedded-app-entry">`;
      });
      document.open();
      document.write(html);
      document.close();
    } catch(e){
      console.warn('App 内加载首页失败:', e.message);
      showLoadError();
    }
  }
  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
    ]);
  }
  async function openLatest(){
    const fallbackTimer = setTimeout(() => {
      setStatus('正在进入乐生活…');
      openIndex(FALLBACK_VERSION);
    }, APP_ENTRY_TIMEOUT_MS);
    try {
      setStatus('正在检查最新版本…');
      clearRuntimeCaches();
      const res = await withTimeout(fetch(cacheBustedUrl('version.json').href, {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      }), 1500);
      let version = FALLBACK_VERSION;
      if(res.ok){
        const data = await res.json();
        version = String(data.version || version).trim() || version;
        if(data.message) setStatus(data.message);
      }
      clearTimeout(fallbackTimer);
      openIndex(version);
    } catch(e){
      setStatus('网络较慢，正在重新打开…');
      clearTimeout(fallbackTimer);
      openIndex(FALLBACK_VERSION);
    }
  }
  openLatest();
</script>
</body>
</html>
